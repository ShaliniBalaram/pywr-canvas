name: Build Windows Installer

# Trigger on version tags (e.g. v0.1.0, v1.2.3)
on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Set up Node.js 18
        uses: actions/setup-node@v4
        with:
          node-version: "18"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install flask flask-cors pywr pyinstaller
          python -c "import pywr; print('pywr version:', pywr.__version__)"

      - name: Install Node dependencies
        run: npm install

      - name: Build Python backend (PyInstaller)
        run: npm run build:python

      - name: Build React frontend
        run: npm run build:react

      - name: Build Electron installer
        run: npm run build:electron
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload installer to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: release/*.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
